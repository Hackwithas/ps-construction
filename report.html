<!DOCTYPE html>

<html>
<head>
  <title>Report</title>

<style>
body {
  font-family: Arial;
  background: #eef2f7;
  padding: 10px;
}

h2 {
  text-align: center;
}

.card {
  background: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
}

</style>

</head>

<body>

<h2>📊 Labour Report</h2>

<div id="reportData"></div>

<div class="card">
  <b>Total Salary:</b> ₹ <span id="totalSalary"></span><br>
  <b>Total Paid:</b> ₹ <span id="totalPaid"></span><br>
  <b>Total Pending:</b> ₹ <span id="totalPending"></span>
</div>

<script>

let labourList = JSON.parse(localStorage.getItem("labourList")) || [];

let totalSalary = 0;
let totalPaid = 0;
let totalPending = 0;

let html = "";

labourList.forEach(labour => {

  let totalDays = 0;
  for(let date in labour.attendance){
    totalDays += labour.attendance[date];
  }

  let base = totalDays * labour.rate;

  let ot = 0;
  for(let d in labour.overtime){
    ot += (labour.rate/8) * labour.overtime[d];
  }

  let total = base + ot;
  let pending = total - labour.paid;

  totalSalary += total;
  totalPaid += labour.paid;
  totalPending += pending;

  html += `
    <div class="card">
      <b>ID:</b> ${labour.id}<br>
      <b>Name:</b> ${labour.name}<br>
      <b>Days:</b> ${totalDays}<br>
      <b>Total:</b> ₹${Math.round(total)}<br>
      <b>Paid:</b> ₹${labour.paid}<br>
      <b>Pending:</b> ₹${Math.round(pending)}
    </div>
  `;
});

document.getElementById("reportData").innerHTML = html;
document.getElementById("totalSalary").innerText = Math.round(totalSalary);
document.getElementById("totalPaid").innerText = totalPaid;
document.getElementById("totalPending").innerText = Math.round(totalPending);

</script>

</body>
</html>
